<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>倍的认识 · 水果倍数乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 拖拽时避免选中文字 */
        }

        body {
            background: #eef3e8;
            font-family: 'Comic Neue', 'Segoe UI Emoji', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主容器 */
        .course-wrapper {
            max-width: 1300px;
            width: 100%;
            background: #fffef7;
            border-radius: 70px;
            box-shadow: 0 25px 40px rgba(80, 60, 30, 0.12);
            overflow: hidden;
        }

        /* 左右布局 */
        .split-layout {
            display: flex;
            flex-wrap: wrap;
        }

        /* 左侧知识点区 */
        .knowledge-area {
            flex: 1.2;
            background: #fff7ec;
            border-radius: 56px;
            margin: 20px 12px 20px 22px;
            padding: 28px 22px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.03);
        }

        /* 右侧游戏区 */
        .game-area {
            flex: 2;
            background: #feffee;
            border-radius: 56px;
            margin: 20px 22px 20px 12px;
            padding: 24px 20px;
            border: 2px solid #ffdfaa;
            box-shadow: 0 8px 18px rgba(0,0,0,0.04);
        }

        @media (max-width: 780px) {
            .split-layout {
                flex-direction: column;
            }
            .knowledge-area, .game-area {
                margin: 16px;
            }
        }

        /* ========= 知识点样式 ========= */
        .badge-title {
            background: #ffddb0;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #b45a2b;
            margin-bottom: 24px;
        }

        .concept-card {
            background: white;
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 12px #f2e3cf;
        }

        .big-rule {
            background: #feebcc;
            padding: 16px;
            border-radius: 32px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #d9792b;
            margin: 16px 0;
        }

        .example-row {
            background: #fff3e0;
            border-radius: 30px;
            padding: 14px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .fruit-icon {
            font-size: 2rem;
        }

        .tip-box {
            background: #e3f2db;
            border-radius: 32px;
            padding: 14px;
            margin-top: 16px;
            text-align: center;
            color: #3a732a;
            font-weight: bold;
        }

        /* ========= 游戏区样式 ========= */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 3px dotted #ffd09c;
        }
        .game-title {
            background: #ffdab3;
            border-radius: 48px;
            padding: 5px 24px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #b95f2a;
        }
        .score-area {
            background: #f9efcf;
            border-radius: 48px;
            padding: 6px 20px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #a5632e;
        }
        .game-msg {
            background: #fff7e0;
            border-radius: 32px;
            padding: 10px;
            text-align: center;
            margin: 10px 0 20px;
            font-weight: bold;
            color: #d87c2c;
        }

        /* 题目列表 */
        .questions-area {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin: 20px 0 30px;
        }
        .question-card {
            background: #ffffffdb;
            border-radius: 48px;
            padding: 18px 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            border: 1px solid #ffe0b8;
        }
        .question-desc {
            font-size: 1.2rem;
            font-weight: bold;
            color: #6a4c2c;
            margin-bottom: 12px;
            background: #fff2e2;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 36px;
        }
        .visual-group {
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .group-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fef5e8;
            padding: 8px 16px;
            border-radius: 36px;
        }
        .group-box span {
            font-size: 1.8rem;
        }
        .answer-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .drop-slot {
            background: #fff3e6;
            border: 3px dashed #f5a96b;
            border-radius: 48px;
            padding: 8px 24px;
            min-width: 80px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #c56e2c;
            transition: 0.1s;
        }
        .drop-slot.filled {
            background: #d4e6c3;
            border: 3px solid #79a33b;
            color: #2e6b0f;
            cursor: default;
        }
        .unit-text {
            font-size: 1.1rem;
            color: #a06939;
            font-weight: bold;
        }

        /* 拖拽卡片区 */
        .drag-panel {
            background: #fff9f0;
            border-radius: 48px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .cards-title {
            font-size: 1.2rem;
            margin-bottom: 18px;
            color: #c5793b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .cards-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
        }
        .drag-card {
            background: #ffe5c4;
            border-radius: 48px;
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #a5551c;
            box-shadow: 0 8px 0 #c1915e;
            cursor: grab;
            transition: 0.05s linear;
            touch-action: none;
        }
        .drag-card:active {
            cursor: grabbing;
        }
        .drag-card.disabled-card {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            display: none;
        }
        .reset-btn {
            background: #ffcf91;
            border: none;
            font-size: 1.2rem;
            padding: 10px 28px;
            border-radius: 48px;
            font-weight: bold;
            color: #6b3f15;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .reset-btn:active {
            transform: scale(0.96);
        }
        .feedback {
            margin-top: 14px;
            font-size: 1rem;
            min-height: 48px;
            font-weight: bold;
            text-align: center;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #c0a072;
            margin-top: 18px;
        }
    </style>
</head>
<body>
<div class="course-wrapper">
    <div class="split-layout">
        <!-- 左侧知识点：倍的认识 -->
        <div class="knowledge-area">
            <div class="badge-title">🌟 倍的认识</div>
            <div class="concept-card">
                <div style="font-size:1.3rem; font-weight:bold;">📖 什么是“倍”？</div>
                <div style="margin: 12px 0;">“倍”表示两个数量之间的关系。<br>
                求一个数是另一个数的几倍，用<strong>除法</strong>：<br>
                <span style="background:#ffefcf; padding:4px 12px; border-radius:28px;">几倍 = 较大数 ÷ 较小数</span>
                </div>
                <div class="big-rule">🎯 举例：6是2的3倍 → 6 ÷ 2 = 3</div>
                <div class="example-row">
                    <div class="fruit-icon">🍎🍎</div>
                    <div> 2个苹果</div>
                    <div style="font-size:1.5rem;">→</div>
                    <div class="fruit-icon">🍓🍓🍓🍓🍓🍓</div>
                    <div> 6个草莓</div>
                    <div style="background:#ffefcf; border-radius:28px; padding:4px 12px;">草莓是苹果的 <strong>3倍</strong> (6÷2=3)</div>
                </div>
                <div class="tip-box">
                    💡 小妙招：<br>
                    画一画，圈一圈，<br>
                    几个一份，看几份，就是几倍！
                </div>
            </div>
        </div>

        <!-- 右侧互动游戏：倍的认识 · 拖拽配对 -->
        <div class="game-area">
            <div class="game-header">
                <div class="game-title">🍬 倍数小侦探 · 拖拽配对</div>
                <div class="score-area">🏆 得分 <span id="scoreValue">0</span> / <span id="totalCount">3</span></div>
            </div>
            <div class="game-msg" id="globalMsg">
                🌟 观察水果数量，把正确的倍数数字拖到【？】位置！
            </div>

            <!-- 3道倍数问题容器 -->
            <div id="questionsContainer" class="questions-area"></div>

            <!-- 可拖拽数字卡片区 -->
            <div class="drag-panel">
                <div class="cards-title">🎴 数字卡片（拖拽到问号框）</div>
                <div id="cardsContainer" class="cards-wrapper"></div>
                <button id="resetGameBtn" class="reset-btn">🔄 新的一局 / 重置</button>
                <div id="feedbackMsg" class="feedback">✨ 按住数字卡片，拖到虚线框里配对～</div>
            </div>
            <footer>⭐ 求倍数：大数 ÷ 小数 = 倍数， 别忘了用除法哟！</footer>
        </div>
    </div>
</div>

<script>
    // ----- 题目数据（倍的认识）-----
    const questionsData = [
        {
            id: 0,
            description: "🍎 苹果和草莓",
            smallName: "苹果",
            bigName: "草莓",
            smallCount: 2,
            bigCount: 6,
            smallEmoji: "🍎",
            bigEmoji: "🍓",
            expectedMultiple: 3,   // 6 ÷ 2 = 3
            unit: "倍"
        },
        {
            id: 1,
            description: "🍌 香蕉和樱桃",
            smallName: "香蕉",
            bigName: "樱桃",
            smallCount: 3,
            bigCount: 12,
            smallEmoji: "🍌",
            bigEmoji: "🍒",
            expectedMultiple: 4,   // 12 ÷ 3 = 4
            unit: "倍"
        },
        {
            id: 2,
            description: "🍊 橘子和蓝莓",
            smallName: "橘子",
            bigName: "蓝莓",
            smallCount: 4,
            bigCount: 8,
            smallEmoji: "🍊",
            bigEmoji: "🫐",
            expectedMultiple: 2,   // 8 ÷ 4 = 2
            unit: "倍"
        }
    ];
    const TOTAL_QS = questionsData.length;
    document.getElementById('totalCount').innerText = TOTAL_QS;

    // 游戏状态
    let correctCount = 0;                      // 已正确配对数量
    let questionCompleted = [false, false, false]; // 每题是否已完成
    let cardElements = [];                     // 存储卡片DOM
    let dropZonesRef = [];                     // 存储每个题目的放置槽DOM

    // 拖拽模拟变量
    let activeDragCard = null;
    let cloneCardDiv = null;
    let startX = 0, startY = 0;
    let isDragging = false;
    let dragValue = null;
    let dragCardDom = null;

    // DOM 元素
    const questionsContainer = document.getElementById('questionsContainer');
    const cardsContainer = document.getElementById('cardsContainer');
    const scoreSpan = document.getElementById('scoreValue');
    const globalMsgDiv = document.getElementById('globalMsg');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const resetBtn = document.getElementById('resetGameBtn');

    // 更新得分UI
    function updateScoreUI() {
        scoreSpan.innerText = correctCount;
        if (correctCount === TOTAL_QS) {
            globalMsgDiv.innerHTML = "🎉🎉 完美！倍数小侦探！你已经完全掌握“倍”的知识 🎉🎉";
            globalMsgDiv.style.background = "#cae3b5";
        } else {
            globalMsgDiv.innerHTML = "🌟 观察水果数量，把正确的倍数数字拖到【？】位置！";
            globalMsgDiv.style.background = "#fff7e0";
        }
    }

    // 显示反馈消息
    function showFeedback(msg, isError = false) {
        feedbackDiv.innerHTML = msg;
        feedbackDiv.style.color = isError ? "#d9534f" : "#3c8b2f";
        setTimeout(() => {
            if (feedbackDiv.innerHTML === msg) {
                feedbackDiv.innerHTML = "✨ 继续拖动数字卡片，放到问号框里～ ✨";
                feedbackDiv.style.color = "#ad6b38";
            }
        }, 1400);
    }

    // 正确填充题目
    function fillQuestion(questionId, cardValue) {
        if (questionCompleted[questionId]) return false;
        const q = questionsData[questionId];
        if (cardValue !== q.expectedMultiple) {
            showFeedback(`❌ 不对哦！ ${q.smallEmoji} ${q.smallCount}个，${q.bigEmoji} ${q.bigCount}个，${q.bigName}是${q.smallName}的几倍？应该用除法 ${q.bigCount}÷${q.smallCount}=${q.expectedMultiple}倍，再试试看～`, true);
            return false;
        }
        // 正确
        questionCompleted[questionId] = true;
        correctCount++;
        updateScoreUI();

        // 更新放置区样式
        const slot = dropZonesRef[questionId];
        if (slot) {
            slot.innerText = q.expectedMultiple;
            slot.classList.add('filled');
            slot.classList.remove('drop-slot');
            slot.style.border = "3px solid #79a33b";
            slot.style.background = "#d4e6c3";
        }
        // 移除对应数值的卡片（拖拽时使用的卡片）
        for (let i = 0; i < cardElements.length; i++) {
            const card = cardElements[i];
            if (card && !card.classList.contains('disabled-card') && parseInt(card.getAttribute('data-value')) === cardValue) {
                card.classList.add('disabled-card');
                card.style.pointerEvents = 'none';
                card.removeEventListener('pointerdown', onPointerDown);
                break;
            }
        }
        showFeedback(`✅ 正确！ ${q.bigEmoji} ${q.bigCount}个是${q.smallEmoji} ${q.smallCount}个的 ${q.expectedMultiple}倍！ 真棒！`, false);
        return true;
    }

    // 渲染所有题目（重置时重新渲染干净状态）
    function renderQuestions() {
        questionsContainer.innerHTML = '';
        dropZonesRef = [];
        for (let i = 0; i < questionsData.length; i++) {
            const q = questionsData[i];
            const qDiv = document.createElement('div');
            qDiv.className = 'question-card';
            qDiv.setAttribute('data-qid', i);

            const descSpan = document.createElement('div');
            descSpan.className = 'question-desc';
            descSpan.innerText = q.description;

            // 可视化组：展示两种水果个数（用emoji重复）
            const visualDiv = document.createElement('div');
            visualDiv.className = 'visual-group';
            const smallGroup = document.createElement('div');
            smallGroup.className = 'group-box';
            smallGroup.innerHTML = `<span>${q.smallEmoji.repeat(Math.min(q.smallCount, 8))}</span><span> ×${q.smallCount}</span>`;
            const arrowSpan = document.createElement('span');
            arrowSpan.innerText = '➡️ 是它的几倍？';
            arrowSpan.style.fontSize = '1rem';
            const bigGroup = document.createElement('div');
            bigGroup.className = 'group-box';
            bigGroup.innerHTML = `<span>${q.bigEmoji.repeat(Math.min(q.bigCount, 8))}</span><span> ×${q.bigCount}</span>`;
            visualDiv.appendChild(smallGroup);
            visualDiv.appendChild(arrowSpan);
            visualDiv.appendChild(bigGroup);

            // 答案区
            const answerDiv = document.createElement('div');
            answerDiv.className = 'answer-area';
            const dropSlot = document.createElement('div');
            dropSlot.className = 'drop-slot';
            dropSlot.innerText = '?';
            dropSlot.setAttribute('data-qid', i);
            dropSlot.setAttribute('data-expected', q.expectedMultiple);
            const unitSpan = document.createElement('span');
            unitSpan.className = 'unit-text';
            unitSpan.innerText = q.unit;

            answerDiv.appendChild(dropSlot);
            answerDiv.appendChild(unitSpan);
            if (questionCompleted[i]) {
                dropSlot.innerText = q.expectedMultiple;
                dropSlot.classList.add('filled');
                dropSlot.classList.remove('drop-slot');
                dropSlot.style.border = "3px solid #79a33b";
                dropSlot.style.background = "#d4e6c3";
            } else {
                dropSlot.innerText = '?';
                dropSlot.classList.add('drop-slot');
            }
            qDiv.appendChild(descSpan);
            qDiv.appendChild(visualDiv);
            qDiv.appendChild(answerDiv);
            questionsContainer.appendChild(qDiv);
            dropZonesRef.push(dropSlot);
        }
    }

    // 生成数字卡片（包含正确答案和干扰项）
    function generateCards() {
        cardsContainer.innerHTML = '';
        cardElements = [];
        // 所有正确答案
        const correctValues = questionsData.map(q => q.expectedMultiple); // [3,4,2]
        // 干扰数字 (1,5,6,0,7 中挑出不与正确值重复的)
        let distractors = [1, 5, 6, 7];
        let allNumbers = [...correctValues];
        for (let d of distractors) {
            if (!allNumbers.includes(d)) allNumbers.push(d);
        }
        // 再额外加一个8
        if (!allNumbers.includes(8)) allNumbers.push(8);
        // 打乱顺序
        for (let i = allNumbers.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allNumbers[i], allNumbers[j]] = [allNumbers[j], allNumbers[i]];
        }
        // 创建卡片
        allNumbers.forEach(num => {
            const card = document.createElement('div');
            card.className = 'drag-card';
            card.innerText = num;
            card.setAttribute('data-value', num);
            card.setAttribute('draggable', 'false');
            card.addEventListener('pointerdown', onPointerDown);
            cardsContainer.appendChild(card);
            cardElements.push(card);
        });
    }

    // ---------- 自定义拖拽实现 ----------
    function onPointerDown(e) {
        const card = e.currentTarget;
        if (card.classList.contains('disabled-card')) return;
        e.preventDefault();
        activeDragCard = card;
        dragValue = parseInt(card.getAttribute('data-value'));
        dragCardDom = card;

        const rect = card.getBoundingClientRect();
        startX = e.clientX;
        startY = e.clientY;

        // 创建克隆体跟随
        cloneCardDiv = card.cloneNode(true);
        cloneCardDiv.style.position = 'fixed';
        cloneCardDiv.style.top = `${rect.top}px`;
        cloneCardDiv.style.left = `${rect.left}px`;
        cloneCardDiv.style.width = `${rect.width}px`;
        cloneCardDiv.style.height = `${rect.height}px`;
        cloneCardDiv.style.margin = '0';
        cloneCardDiv.style.opacity = '0.85';
        cloneCardDiv.style.zIndex = '9999';
        cloneCardDiv.style.pointerEvents = 'none';
        cloneCardDiv.style.boxShadow = '0 8px 16px rgba(0,0,0,0.2)';
        document.body.appendChild(cloneCardDiv);

        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        isDragging = true;
        activeDragCard.style.opacity = '0.3';
    }

    function onPointerMove(e) {
        if (!isDragging || !cloneCardDiv) return;
        e.preventDefault();
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        const currentTop = parseFloat(cloneCardDiv.style.top);
        const currentLeft = parseFloat(cloneCardDiv.style.left);
        cloneCardDiv.style.top = `${currentTop + dy}px`;
        cloneCardDiv.style.left = `${currentLeft + dx}px`;
        startX = e.clientX;
        startY = e.clientY;

        // 高亮放置区
        const elemUnder = document.elementsFromPoint(e.clientX, e.clientY);
        let hoverSlot = null;
        for (let el of elemUnder) {
            if (el.classList && el.classList.contains('drop-slot') && !el.classList.contains('filled')) {
                hoverSlot = el;
                break;
            }
            if (el.parentElement && el.parentElement.classList && el.parentElement.classList.contains('drop-slot') && !el.parentElement.classList.contains('filled')) {
                hoverSlot = el.parentElement;
                break;
            }
        }
        // 清除所有高亮背景
        dropZonesRef.forEach(zone => {
            if (zone) zone.style.background = '';
        });
        if (hoverSlot) {
            hoverSlot.style.background = '#ffe1b3';
        }
    }

    function onPointerUp(e) {
        if (!isDragging) {
            cleanDrag();
            return;
        }
        e.preventDefault();
        // 寻找下方的放置区
        const elementsUnder = document.elementsFromPoint(e.clientX, e.clientY);
        let targetSlot = null;
        for (let el of elementsUnder) {
            if (el.classList && el.classList.contains('drop-slot') && !el.classList.contains('filled')) {
                targetSlot = el;
                break;
            }
            if (el.parentElement && el.parentElement.classList && el.parentElement.classList.contains('drop-slot') && !el.parentElement.classList.contains('filled')) {
                targetSlot = el.parentElement;
                break;
            }
        }

        let success = false;
        if (targetSlot) {
            const qidAttr = targetSlot.getAttribute('data-qid');
            if (qidAttr !== null) {
                const qid = parseInt(qidAttr);
                if (!questionCompleted[qid]) {
                    success = fillQuestion(qid, dragValue);
                } else {
                    showFeedback("🎯 这道题已经答对了！不能重复填哦～", true);
                }
            } else {
                showFeedback("🤔 出错了，请刷新重试", true);
            }
        } else {
            showFeedback("🐣 要把卡片拖到题目的【？】虚线框里！", true);
        }

        cleanDrag();
        // 如果配对失败，恢复卡片透明度
        if (!success && activeDragCard && !activeDragCard.classList.contains('disabled-card')) {
            activeDragCard.style.opacity = '1';
        }
        // 重置所有放置区高亮
        dropZonesRef.forEach(zone => {
            if (zone) zone.style.background = '';
        });
    }

    function cleanDrag() {
        if (cloneCardDiv && cloneCardDiv.parentNode) cloneCardDiv.parentNode.removeChild(cloneCardDiv);
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
        isDragging = false;
        cloneCardDiv = null;
        if (activeDragCard && !activeDragCard.classList.contains('disabled-card')) {
            activeDragCard.style.opacity = '1';
        }
        activeDragCard = null;
        dragValue = null;
        dragCardDom = null;
    }

    // 重置整个游戏
    function resetGame() {
        // 重置状态
        correctCount = 0;
        questionCompleted = [false, false, false];
        updateScoreUI();
        // 清除拖拽残留
        if (cloneCardDiv) cleanDrag();
        // 重新渲染题目和卡片
        renderQuestions();
        generateCards();
        showFeedback("✨ 游戏已重置！重新挑战倍数配对 ✨", false);
        globalMsgDiv.innerHTML = "🌟 观察水果数量，把正确的倍数数字拖到【？】位置！";
        globalMsgDiv.style.background = "#fff7e0";
    }

    // 初始化
    function init() {
        renderQuestions();
        generateCards();
        correctCount = 0;
        questionCompleted = [false, false, false];
        updateScoreUI();
    }

    // 防止移动端滚动干扰拖拽
    document.body.addEventListener('touchmove', function(e) {
        if (isDragging) {
            e.preventDefault();
        }
    }, { passive: false });
    window.addEventListener('dragstart', (e) => e.preventDefault());

    resetBtn.addEventListener('click', () => {
        if (isDragging) cleanDrag();
        resetGame();
    });

    init();
</script>
</body>
</html>
