<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 40px; color: #333; line-height: 1.6; }
        h1 { color: #ff9800; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .cell { background: #fff8e1; padding: 10px; text-align: center; border: 1px solid #ffe082; }
    </style>
</head>
<body>
    <h1>千以内的数</h1>
    <p>10个一百是一千。我们不仅要会数，还要会写。</p>
    <div class="grid">
        <div class="cell">百位</div>
        <div class="cell">十位</div>
        <div class="cell">个位</div>
        <div class="cell">3</div>
        <div class="cell">8</div>
        <div class="cell">4</div>
    </div>
    <p>读作：三百八十四</p>
</body>
</html>
