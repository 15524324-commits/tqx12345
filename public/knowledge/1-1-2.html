<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>除法竖式的写法 · 数学小工坊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 提升拖拽体验，避免选中文字 */
        }

        body {
            background: #eef7f0;
            font-family: 'Comic Neue', 'Segoe UI Emoji', 'Chalkboard SE', 'Comic Sans MS', 'cursive', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主卡片容器 */
        .course-wrapper {
            max-width: 1300px;
            width: 100%;
            background: #fffef7;
            border-radius: 70px;
            box-shadow: 0 25px 40px rgba(80, 60, 30, 0.12);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 左右区域布局 */
        .split-layout {
            display: flex;
            flex-wrap: wrap;
        }

        /* 左侧知识点区 */
        .knowledge-area {
            flex: 1.2;
            background: #fff7ed;
            border-radius: 56px;
            margin: 20px 12px 20px 22px;
            padding: 28px 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.04);
        }

        /* 右侧游戏区 */
        .game-area {
            flex: 2;
            background: #feffef;
            border-radius: 56px;
            margin: 20px 22px 20px 12px;
            padding: 24px 20px;
            border: 2px solid #ffdfaa;
            box-shadow: 0 8px 18px rgba(0,0,0,0.04);
        }

        @media (max-width: 780px) {
            .split-layout {
                flex-direction: column;
            }
            .knowledge-area, .game-area {
                margin: 16px;
            }
        }

        /* ========= 知识点样式 ========= */
        .badge-title {
            background: #ffdbb5;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 1.7rem;
            font-weight: bold;
            color: #b45a2b;
            margin-bottom: 24px;
        }

        .step-card {
            background: white;
            border-radius: 44px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 5px 12px #f1e2cf;
        }

        .step-num {
            background: #f7bc6c;
            display: inline-block;
            width: 32px;
            height: 32px;
            text-align: center;
            line-height: 32px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-right: 12px;
        }

        .step-text {
            font-size: 1.1rem;
            line-height: 1.45;
            color: #4f3a24;
        }

        .example-box {
            background: #fff0df;
            border-radius: 36px;
            padding: 18px;
            margin-top: 16px;
            text-align: center;
        }

        .vertical-demo {
            font-family: monospace;
            font-size: 1.4rem;
            background: #fbe8d4;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 32px;
        }

        /* ========= 游戏区域 ========= */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 3px dotted #ffce92;
        }
        .game-title {
            background: #ffd9ae;
            border-radius: 48px;
            padding: 5px 24px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #b75926;
        }
        .score-area {
            background: #ffefcf;
            border-radius: 48px;
            padding: 6px 20px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #a5632e;
        }
        .msg-board {
            background: #fff1da;
            border-radius: 32px;
            padding: 12px;
            text-align: center;
            margin: 12px 0 20px;
            font-weight: bold;
            color: #d2712c;
        }

        /* 三个竖式题目容器 */
        .questions-area {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin: 20px 0 30px;
        }

        .question-card {
            background: #ffffffdb;
            border-radius: 48px;
            padding: 16px 18px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: 1px solid #ffe2ba;
            transition: all 0.1s;
        }

        .question-title {
            font-size: 1.2rem;
            background: #ffefbf;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 26px;
            margin-bottom: 16px;
            color: #ad6a38;
        }

        /* 除法竖式模拟器 (用flex 模拟竖式结构) */
        .division-grid {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-family: 'Courier New', 'SF Mono', monospace;
            font-size: 1.4rem;
            font-weight: bold;
            background: #fffaf2;
            padding: 12px 20px;
            border-radius: 32px;
            width: 100%;
            overflow-x: auto;
        }

        .div-row {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px;
            margin: 4px 0;
        }

        .div-cell {
            min-width: 40px;
            text-align: center;
            font-weight: bold;
            color: #4f3a28;
        }

        .drop-slot {
            background: #fff0df;
            border: 3px dashed #f5b06b;
            border-radius: 20px;
            padding: 4px 12px;
            min-width: 60px;
            text-align: center;
            font-weight: bold;
            font-size: 1.6rem;
            color: #b96726;
            cursor: pointer;
            transition: 0.1s;
            display: inline-block;
        }

        .drop-slot.filled {
            background: #d4e6c3;
            border: 3px solid #79a33b;
            color: #386a12;
            cursor: default;
        }

        .correct-badge {
            margin-left: 15px;
            font-size: 1.1rem;
            background: #b4da8c;
            padding: 2px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        /* 拖拽卡片区 */
        .drag-cards-panel {
            background: #fff7e8;
            border-radius: 48px;
            padding: 20px;
            margin-top: 10px;
            text-align: center;
        }
        .cards-title {
            font-size: 1.2rem;
            margin-bottom: 18px;
            color: #bf712e;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
        }
        .drag-card {
            width: 80px;
            height: 80px;
            background: #fee0bc;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            color: #b15317;
            box-shadow: 0 8px 0 #be8b58;
            cursor: grab;
            touch-action: none;
            transition: 0.05s linear;
        }
        .drag-card:active {
            cursor: grabbing;
        }
        .drag-card.disabled-card {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            box-shadow: none;
        }
        .reset-game-btn {
            background: #ffcf91;
            border: none;
            font-size: 1.2rem;
            padding: 10px 32px;
            border-radius: 50px;
            font-weight: bold;
            color: #663f18;
            margin-top: 24px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .reset-game-btn:active {
            transform: scale(0.96);
        }
        .feedback-info {
            margin-top: 12px;
            font-size: 1rem;
            min-height: 48px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #c0a072;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="course-wrapper">
    <div class="split-layout">
        <!-- 左侧知识点区：除法竖式的写法 -->
        <div class="knowledge-area">
            <div class="badge-title">📐 除法竖式的写法</div>
            <div class="step-card">
                <div><span class="step-num">1</span><span class="step-text">写除号“厂” (像小房子)</span></div>
                <div style="margin-top:8px;"><span class="step-num">2</span><span class="step-text">被除数写在里面，除数写在外面左边</span></div>
                <div style="margin-top:8px;"><span class="step-num">3</span><span class="step-text">商写在“厂”的上面，对着被除数的每一位</span></div>
                <div style="margin-top:8px;"><span class="step-num">4</span><span class="step-text">商 × 除数，积写在被除数下面，画横线相减</span></div>
                <div style="margin-top:8px;"><span class="step-num">5</span><span class="step-text">落下的余数要 < 除数，继续除下去</span></div>
            </div>
            <div class="example-box">
                🌰 例子：15 ÷ 4 <br>
                <div class="vertical-demo">
                    3  ← 商<br>
                    4 ) 1 5<br>
                        1 2<br>
                        ──<br>
                          3  ← 余数
                </div>
                <div style="margin-top:8px;">✨ 余数3比除数4小，正确！</div>
            </div>
            <div class="reminder" style="background:#e6f2e0; border-radius:28px; padding:12px; margin-top:16px;">
                💡 小诀窍：商要写在个位上面，每一步的积要对齐！
            </div>
        </div>

        <!-- 右侧互动游戏：竖式填空 拖拽配对 -->
        <div class="game-area">
            <div class="game-header">
                <div class="game-title">🧸 竖式建筑师 · 拖拽填空</div>
                <div class="score-area">🏆 得分 <span id="totalScore">0</span> / <span id="totalQuestionsCount">3</span></div>
            </div>
            <div class="msg-board" id="globalMsg">
                🌟 观察竖式，把正确的数字卡片拖到“？”位置！
            </div>

            <!-- 三个竖式题目动态生成区域 -->
            <div id="questionsDynamic" class="questions-area"></div>

            <!-- 可拖拽卡片区域 -->
            <div class="drag-cards-panel">
                <div class="cards-title">🎴 数字魔法卡片（拖拽到空缺）</div>
                <div id="dragCardsContainer" class="cards-container"></div>
                <button id="resetGameBtn" class="reset-game-btn">🔄 新的一局 / 重置</button>
                <div id="feedbackMsg" class="feedback-info">✨ 拖拽数字卡片，放到竖式空位上～</div>
            </div>
            <footer>⭐ 按住卡片 → 拖到问号框 → 松开 完成配对！</footer>
        </div>
    </div>
</div>

<script>
    // ----- 题目数据 (每个竖式缺失一个关键数字，展示完整过程，空缺用占位符)
    // 为了友好显示，每个竖式都给出完整文本结构，空缺位置为自定义dropzone
    const questionsBank = [
        {
            id: 0,
            description: "🍎 苹果分堆：14 ÷ 3 = 4 …… 2",
            missingType: "商",
            expectedValue: 4,
            divisor: 3,
            dividend: 14,
            quotient: 4,
            remainder: 2,
            // 竖式视觉: 商空缺
            renderHtml: (filledValue) => {
                const showValue = (filledValue !== undefined && filledValue !== null) ? filledValue : "?";
                return `
                    <div class="division-grid">
                        <div class="div-row">
                            <span style="margin-left: 48px;"> ${showValue} </span>
                        </div>
                        <div class="div-row">
                            <span>3 ) 1 4</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 20px;">1 2</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 20px;">──</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 28px;">2</span>
                        </div>
                    </div>
                `;
            }
        },
        {
            id: 1,
            description: "🐧 企鹅分组：17 ÷ 5 = 3 …… 2",
            missingType: "余数",
            expectedValue: 2,
            divisor: 5,
            dividend: 17,
            quotient: 3,
            remainder: 2,
            renderHtml: (filledValue) => {
                const showRemain = (filledValue !== undefined && filledValue !== null) ? filledValue : "?";
                return `
                    <div class="division-grid">
                        <div class="div-row">
                            <span style="margin-left: 48px;"> 3 </span>
                        </div>
                        <div class="div-row">
                            <span>5 ) 1 7</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 20px;">1 5</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 20px;">──</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 28px;"> ${showRemain} </span>
                        </div>
                    </div>
                `;
            }
        },
        {
            id: 2,
            description: "🪁 风筝分组：23 ÷ 4 = 5 …… 3",
            missingType: "商",
            expectedValue: 5,
            divisor: 4,
            dividend: 23,
            quotient: 5,
            remainder: 3,
            renderHtml: (filledValue) => {
                const showQuotient = (filledValue !== undefined && filledValue !== null) ? filledValue : "?";
                return `
                    <div class="division-grid">
                        <div class="div-row">
                            <span style="margin-left: 48px;"> ${showQuotient} </span>
                        </div>
                        <div class="div-row">
                            <span>4 ) 2 3</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 20px;">2 0</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 20px;">──</span>
                        </div>
                        <div class="div-row">
                            <span style="margin-left: 28px;">3</span>
                        </div>
                    </div>
                `;
            }
        }
    ];
    const TOTAL_QS = questionsBank.length;
    document.getElementById('totalQuestionsCount').innerText = TOTAL_QS;

    // 全局状态
    let correctCount = 0;                 // 已正确配对数量
    let dropStatus = [false, false, false];  // 每个题目是否已正确填充
    let filledValues = [null, null, null];   // 存储当前显示的值 (正确后存储真实数字)
    let dragCardsData = [];               // 卡片数值列表（动态，包含正确值和干扰项）
    let originalCardElements = new Map();  // 存储卡片DOM元素便于重置

    // 拖拽模拟全局变量
    let activeDragCard = null;      // 被拖拽的原卡片DOM
    let cloneCardDiv = null;        // 克隆体
    let startX = 0, startY = 0;
    let isDraggingActive = false;
    let dragValue = null;

    // DOM 元素
    const questionsContainer = document.getElementById('questionsDynamic');
    const dragContainer = document.getElementById('dragCardsContainer');
    const totalScoreSpan = document.getElementById('totalScore');
    const globalMsgDiv = document.getElementById('globalMsg');
    const feedbackMsgDiv = document.getElementById('feedbackMsg');
    const resetBtn = document.getElementById('resetGameBtn');

    // 存储每个题目对应的放置区DOM (动态刷新)
    let dropZonesRef = [];   // 每个元素 { containerDiv, slotElement, qid }

    // 更新分数UI
    function updateScoreUI() {
        totalScoreSpan.innerText = correctCount;
        if (correctCount === TOTAL_QS) {
            globalMsgDiv.innerHTML = "🎉🎉 完美！竖式建筑师！你已经掌握除法竖式的写法啦 🎉🎉";
            globalMsgDiv.style.background = "#c8e6b5";
        } else {
            globalMsgDiv.innerHTML = "🧸 把卡片拖到问号位置，让竖式变完整！";
            globalMsgDiv.style.background = "#fff1da";
        }
    }

    // 显示短暂反馈
    function showMessage(msg, isError = false) {
        feedbackMsgDiv.innerHTML = msg;
        feedbackMsgDiv.style.color = isError ? "#e06949" : "#4a8f29";
        setTimeout(() => {
            if (feedbackMsgDiv.innerHTML === msg) {
                feedbackMsgDiv.innerHTML = "💪 继续拖动卡片完成竖式吧～";
                feedbackMsgDiv.style.color = "#ad6b38";
            }
        }, 1300);
    }

    // 正确填充某个题目
    function fillCorrect(qid, value) {
        if (dropStatus[qid]) return false;
        const question = questionsBank[qid];
        if (value !== question.expectedValue) return false;
        
        // 更新状态
        dropStatus[qid] = true;
        filledValues[qid] = value;
        correctCount++;
        updateScoreUI();
        
        // 重新渲染该竖式，显示正确的数字（去掉dropzone，变成静态文本）
        renderSingleQuestion(qid);
        
        // 正确配对后，找到对应卡片并永久移除（disabled）
        // 找到当前所有卡片中数值等于value且尚未禁用的，移除第一张匹配卡片（避免移除多个相同值但多个一样值的情况）
        let cards = document.querySelectorAll('.drag-card:not(.disabled-card)');
        let targetCard = null;
        for (let card of cards) {
            if (parseInt(card.getAttribute('data-value')) === value) {
                targetCard = card;
                break;
            }
        }
        if (targetCard) {
            targetCard.classList.add('disabled-card');
            targetCard.style.pointerEvents = 'none';
            targetCard.setAttribute('draggable', 'false');
            // 移除拖拽监听
            targetCard.removeEventListener('pointerdown', onPointerDown);
        }
        
        showMessage(`✅ 正确！${question.description} 的 ${question.missingType} 是 ${value}，竖式完整啦！`, false);
        return true;
    }

    // 重新渲染单个竖式（根据是否已填充决定显示静态数字还是dropzone）
    function renderSingleQuestion(qid) {
        const question = questionsBank[qid];
        const isFilled = dropStatus[qid];
        let filledVal = isFilled ? filledValues[qid] : null;
        
        // 获取该题目的外层容器
        const qCard = document.querySelector(`.question-card[data-qid='${qid}']`);
        if (!qCard) return;
        const bodyDiv = qCard.querySelector('.question-body');
        if (!bodyDiv) return;
        
        if (isFilled) {
            // 已经正确：显示静态正确数字，无拖拽区域
            let staticHtml = question.renderHtml(filledVal);
            bodyDiv.innerHTML = staticHtml;
        } else {
            // 未填充：渲染带有dropzone的竖式
            let tempHtml = "";
            if (qid === 0) {
                // 商的位置放dropzone
                tempHtml = `
                    <div class="division-grid">
                        <div class="div-row">
                            <span style="margin-left: 48px;"> <span class="drop-slot" data-qid="0" data-expected="4" data-type="quotient"> ? </span> </span>
                        </div>
                        <div class="div-row"><span>3 ) 1 4</span></div>
                        <div class="div-row"><span style="margin-left:20px;">1 2</span></div>
                        <div class="div-row"><span style="margin-left:20px;">──</span></div>
                        <div class="div-row"><span style="margin-left:28px;">2</span></div>
                    </div>
                `;
            } else if (qid === 1) {
                // 余数位置dropzone
                tempHtml = `
                    <div class="division-grid">
                        <div class="div-row"><span style="margin-left:48px;">3</span></div>
                        <div class="div-row"><span>5 ) 1 7</span></div>
                        <div class="div-row"><span style="margin-left:20px;">1 5</span></div>
                        <div class="div-row"><span style="margin-left:20px;">──</span></div>
                        <div class="div-row"><span style="margin-left:28px;"><span class="drop-slot" data-qid="1" data-expected="2" data-type="remainder"> ? </span></span></div>
                    </div>
                `;
            } else {
                // qid=2 商空缺
                tempHtml = `
                    <div class="division-grid">
                        <div class="div-row"><span style="margin-left:48px;"><span class="drop-slot" data-qid="2" data-expected="5" data-type="quotient"> ? </span></span></div>
                        <div class="div-row"><span>4 ) 2 3</span></div>
                        <div class="div-row"><span style="margin-left:20px;">2 0</span></div>
                        <div class="div-row"><span style="margin-left:20px;">──</span></div>
                        <div class="div-row"><span style="margin-left:28px;">3</span></div>
                    </div>
                `;
            }
            bodyDiv.innerHTML = tempHtml;
            // 重新绑定dropzone事件 (直接挂载全局监听，因为事件委托)
        }
        // 重新挂载dropzone事件监听 (通过事件委托已在全局注册)
    }

    // 渲染所有题目（初始化/重置时）
    function renderAllQuestions() {
        questionsContainer.innerHTML = '';
        for (let i = 0; i < questionsBank.length; i++) {
            const q = questionsBank[i];
            const cardDiv = document.createElement('div');
            cardDiv.className = 'question-card';
            cardDiv.setAttribute('data-qid', i);
            const titleSpan = document.createElement('div');
            titleSpan.className = 'question-title';
            titleSpan.innerText = q.description;
            const bodyDiv = document.createElement('div');
            bodyDiv.className = 'question-body';
            cardDiv.appendChild(titleSpan);
            cardDiv.appendChild(bodyDiv);
            questionsContainer.appendChild(cardDiv);
            
            if (dropStatus[i]) {
                // 已填充状态显示静态
                bodyDiv.innerHTML = q.renderHtml(filledValues[i]);
            } else {
                // 未填充显示带dropzone模板
                if (i === 0) {
                    bodyDiv.innerHTML = `
                        <div class="division-grid">
                            <div class="div-row"><span style="margin-left:48px;"><span class="drop-slot" data-qid="0" data-expected="4"> ? </span></span></div>
                            <div class="div-row"><span>3 ) 1 4</span></div>
                            <div class="div-row"><span style="margin-left:20px;">1 2</span></div>
                            <div class="div-row"><span style="margin-left:20px;">──</span></div>
                            <div class="div-row"><span style="margin-left:28px;">2</span></div>
                        </div>
                    `;
                } else if (i === 1) {
                    bodyDiv.innerHTML = `
                        <div class="division-grid">
                            <div class="div-row"><span style="margin-left:48px;">3</span></div>
                            <div class="div-row"><span>5 ) 1 7</span></div>
                            <div class="div-row"><span style="margin-left:20px;">1 5</span></div>
                            <div class="div-row"><span style="margin-left:20px;">──</span></div>
                            <div class="div-row"><span style="margin-left:28px;"><span class="drop-slot" data-qid="1" data-expected="2"> ? </span></span></div>
                        </div>
                    `;
                } else {
                    bodyDiv.innerHTML = `
                        <div class="division-grid">
                            <div class="div-row"><span style="margin-left:48px;"><span class="drop-slot" data-qid="2" data-expected="5"> ? </span></span></div>
                            <div class="div-row"><span>4 ) 2 3</span></div>
                            <div class="div-row"><span style="margin-left:20px;">2 0</span></div>
                            <div class="div-row"><span style="margin-left:20px;">──</span></div>
                            <div class="div-row"><span style="margin-left:28px;">3</span></div>
                        </div>
                    `;
                }
            }
        }
    }

    // 重置整个游戏
    function resetGame() {
        // 重置状态
        correctCount = 0;
        dropStatus = [false, false, false];
        filledValues = [null, null, null];
        updateScoreUI();
        // 清除所有卡片旧监听并重新生成卡片
        if (cloneCardDiv && cloneCardDiv.parentNode) cloneCardDiv.parentNode.removeChild(cloneCardDiv);
        isDraggingActive = false;
        activeDragCard = null;
        generateCards();  // 重新生成卡片（包含所有数字）
        renderAllQuestions(); // 重新渲染竖式（全部未填充）
        showMessage("✨ 游戏已重置，重新挑战吧！", false);
        globalMsgDiv.innerHTML = "🌟 把正确的数字卡片拖到竖式的问号位置！";
        globalMsgDiv.style.background = "#fff1da";
    }

    // 生成数字卡片（正确值+干扰项）
    function generateCards() {
        dragContainer.innerHTML = '';
        // 正确数字集合（每个题目缺失的正确值）
        const neededValues = [4, 2, 5];  // 分别对应题0,1,2 的正确数字
        // 干扰项 1,3,6,0
        let distractors = [1, 3, 6, 0];
        // 组合所有卡片数值，确保每个正确数字至少出现一次，并且总卡片数量适中
        let cardValues = [...neededValues, ...distractors];
        // 为了避免干扰项过多，只保留4张干扰卡
        cardValues = cardValues.slice(0, 7);
        // 打乱顺序
        for (let i = cardValues.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardValues[i], cardValues[j]] = [cardValues[j], cardValues[i]];
        }
        // 创建卡片DOM
        cardValues.forEach(val => {
            const card = document.createElement('div');
            card.className = 'drag-card';
            card.innerText = val;
            card.setAttribute('data-value', val);
            card.setAttribute('draggable', 'false');
            card.addEventListener('pointerdown', onPointerDown);
            dragContainer.appendChild(card);
        });
    }

    // ---------- 自定义拖拽逻辑 (支持触摸/鼠标) ----------
    function onPointerDown(e) {
        const card = e.currentTarget;
        if (card.classList.contains('disabled-card')) return;
        e.preventDefault();
        activeDragCard = card;
        dragValue = parseInt(card.getAttribute('data-value'));
        const rect = card.getBoundingClientRect();
        startX = e.clientX;
        startY = e.clientY;
        
        cloneCardDiv = card.cloneNode(true);
        cloneCardDiv.style.position = 'fixed';
        cloneCardDiv.style.top = `${rect.top}px`;
        cloneCardDiv.style.left = `${rect.left}px`;
        cloneCardDiv.style.width = `${rect.width}px`;
        cloneCardDiv.style.height = `${rect.height}px`;
        cloneCardDiv.style.margin = '0';
        cloneCardDiv.style.opacity = '0.8';
        cloneCardDiv.style.zIndex = '9999';
        cloneCardDiv.style.pointerEvents = 'none';
        cloneCardDiv.classList.remove('disabled-card');
        document.body.appendChild(cloneCardDiv);
        
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        isDraggingActive = true;
        activeDragCard.style.opacity = '0.3';
    }
    
    function onPointerMove(e) {
        if (!isDraggingActive || !cloneCardDiv) return;
        e.preventDefault();
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        const currentTop = parseFloat(cloneCardDiv.style.top);
        const currentLeft = parseFloat(cloneCardDiv.style.left);
        cloneCardDiv.style.top = `${currentTop + dy}px`;
        cloneCardDiv.style.left = `${currentLeft + dx}px`;
        startX = e.clientX;
        startY = e.clientY;
    }
    
    function onPointerUp(e) {
        if (!isDraggingActive) {
            cleanDrag();
            return;
        }
        e.preventDefault();
        // 查找下方的放置区
        const elementsUnder = document.elementsFromPoint(e.clientX, e.clientY);
        let targetSlot = null;
        for (let el of elementsUnder) {
            if (el.classList && el.classList.contains('drop-slot') && !el.classList.contains('filled')) {
                targetSlot = el;
                break;
            }
        }
        let isValid = false;
        if (targetSlot && targetSlot.classList.contains('drop-slot') && !targetSlot.classList.contains('filled')) {
            const qid = parseInt(targetSlot.getAttribute('data-qid'));
            const expected = parseInt(targetSlot.getAttribute('data-expected'));
            if (!isNaN(qid) && !dropStatus[qid] && dragValue === expected) {
                // 正确填充
                fillCorrect(qid, dragValue);
                isValid = true;
            } else if (dropStatus[qid]) {
                showMessage("⚠️ 这个竖式已经完整啦！不能重复填哦", true);
            } else {
                showMessage(`❌ 不对哦，这个位置应该放数字 ${expected}，再试试看！`, true);
            }
        } else if (targetSlot && targetSlot.classList.contains('filled')) {
            showMessage("🔒 这个格子已经填过了，不能修改哟", true);
        } else {
            showMessage("💡 要把卡片拖到竖式里的问号（?）虚线框上！", true);
        }
        
        cleanDrag();
        if (!isValid && activeDragCard) {
            activeDragCard.style.opacity = '1';
        }
    }
    
    function cleanDrag() {
        if (cloneCardDiv && cloneCardDiv.parentNode) cloneCardDiv.parentNode.removeChild(cloneCardDiv);
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
        isDraggingActive = false;
        cloneCardDiv = null;
        if (activeDragCard && !activeDragCard.classList.contains('disabled-card')) {
            activeDragCard.style.opacity = '1';
        }
        activeDragCard = null;
        dragValue = null;
    }
    
    // 初始化游戏
    function init() {
        generateCards();
        renderAllQuestions();
        correctCount = 0;
        dropStatus = [false, false, false];
        filledValues = [null, null, null];
        updateScoreUI();
    }
    
    resetBtn.addEventListener('click', () => {
        if (cloneCardDiv) cleanDrag();
        resetGame();
    });
    
    // 防止页面滚动干扰
    document.body.addEventListener('touchmove', function(e) {
        if (isDraggingActive) e.preventDefault();
    }, { passive: false });
    window.addEventListener('dragstart', (e) => e.preventDefault());
    
    init();
</script>
</body>
</html>
